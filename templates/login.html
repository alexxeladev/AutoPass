<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Система пропусков</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0d0f12;
            --surface:  #141619;
            --surface-2:#1c1f24;
            --border:   #2a2e36;
            --text:     #e8eaed;
            --text-2:   #9aa0ad;
            --text-3:   #5c6270;
            --accent:   #00e676;
            --accent-dim: rgba(0,230,118,.12);
            --red:      #ff5252;
            --red-dim:  rgba(255,82,82,.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* Grid pattern background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: .3;
            pointer-events: none;
        }

        /* Glowing orb */
        body::after {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,230,118,.06) 0%, transparent 70%);
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .login-wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 380px;
            padding: 24px;
        }

        /* Logo */
        .logo-area {
            text-align: center; margin-bottom: 36px;
        }

        .logo-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 56px; height: 56px;
            background: var(--accent);
            border-radius: 16px;
            margin-bottom: 14px;
        }

        .logo-badge svg { width: 26px; height: 26px; color: #000; }

        .logo-title {
            font-size: 20px; font-weight: 700; color: var(--text);
        }

        .logo-sub {
            font-size: 12px; color: var(--text-3);
            font-family: 'DM Mono', monospace;
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-top: 4px;
        }

        /* Card */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
        }

        .login-title {
            font-size: 16px; font-weight: 700;
            margin-bottom: 22px; color: var(--text);
        }

        /* Error */
        .error-box {
            background: var(--red-dim);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px; color: var(--red);
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 18px;
        }

        /* Fields */
        .field { margin-bottom: 16px; }

        .field label {
            display: block;
            font-size: 11.5px; font-weight: 600;
            color: var(--text-3); text-transform: uppercase;
            letter-spacing: .6px; margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text); font-family: 'Manrope', sans-serif;
            font-size: 14px; padding: 10px 14px;
            outline: none; transition: border-color .15s;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .field input::placeholder { color: var(--text-3); }

        /* Submit */
        .btn-login {
            width: 100%; padding: 12px;
            background: var(--accent); color: #000;
            border: none; border-radius: 8px;
            font-family: 'Manrope', sans-serif;
            font-size: 14px; font-weight: 700;
            cursor: pointer; margin-top: 8px;
            transition: filter .15s, transform .1s;
            letter-spacing: .3px;
        }

        .btn-login:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        /* Footer */
        .login-footer {
            text-align: center; margin-top: 20px;
            font-size: 12px; color: var(--text-3);
            font-family: 'DM Mono', monospace;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="logo-area">
        <div class="logo-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <div class="logo-title">Петровское Парк</div>
        <div class="logo-sub">Система пропусков</div>
    </div>

    <div class="login-card">
        <div class="login-title">Вход в систему</div>

        {% if error %}
        <div class="error-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login">
            <div class="field">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username"
                       placeholder="Введите логин" autocomplete="username"
                       autofocus required>
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Войти →</button>
        </form>
    </div>

    <div class="login-footer">secure · encrypted · authenticated</div>
</div>
</body>
</html>
